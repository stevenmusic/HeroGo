<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeroGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+TC:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --gold: #fbbf24;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --hero-color: #ec4899; 
            --hero-secondary: #8b5cf6; 
            --nav-height: 70px; /* 導航欄高度 */
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 60%, #000000 100%);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            /* 確保 body 底部有空間給導航欄 */
            padding-bottom: var(--nav-height); 
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- 頂部儀表板 --- */
        header {
            flex-shrink: 0;
            min-height: 100px;
            padding: 10px 20px 5px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(15, 23, 42, 0.4) 100%, transparent 100%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-title-container {
            text-align: center;
            margin-bottom: 8px;
        }

        .hero-title {
            font-family: 'Orbitron', 'Russo One', sans-serif;
            font-weight: 900;
            font-size: clamp(24px, 5vw, 36px);
            color: var(--hero-color);
            text-shadow: 0 0 25px rgba(236, 72, 153, 0.7);
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: clamp(10px, 2.5vw, 14px);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .stats-container {
            display: flex;
            gap: clamp(5px, 1vw, 15px);
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        .resource-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 12px;
            border: var(--glass-border);
            backdrop-filter: blur(4px);
            flex: 1;
            justify-content: center;
            min-width: 80px;
        }

        .icon { font-size: clamp(16px, 4vw, 24px); margin-right: 8px; }
        .label { font-size: clamp(8px, 2vw, 12px); color: #94a3b8; text-transform: uppercase; display: block; }
        .value { font-family: 'Russo One', sans-serif; font-size: clamp(14px, 4vw, 20px); color: #fff; }

        /* --- 主遊戲區 --- */
        #game-stage {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 從上往下排 */
            padding-top: 10px;
            width: 100%;
            /* 預留空間：琴鍵高度 + 琴鍵Padding + 導航欄高度 */
            padding-bottom: calc(160px + 20px + var(--nav-height)); 
            overflow: hidden;
        }

        /* 怪物倒數 (置於最頂層) */
        #boss-timer-bar {
            position: absolute;
            top: 10px; /* 遠離血條 */
            width: clamp(150px, 40vw, 300px);
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            opacity: 0;
            border: 1px solid #555;
            z-index: 30;
        }
        #boss-timer-fill {
            height: 100%;
            background: var(--danger);
            width: 100%;
            box-shadow: 0 0 10px var(--danger);
        }

        .stage-indicator {
            position: absolute;
            top: 40px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(30px, 10vw, 80px);
            color: rgba(255,255,255,0.05);
            font-weight: 900;
            transform: skew(-10deg);
            z-index: 0;
            pointer-events: none;
        }

        /* 核心容器：包含血條、怪物、題目 */
        .monster-wrapper {
            position: relative;
            width: 90vw;
            max-width: 600px;
            /* 增加高度以容納平板上的大圖片 */
            min-height: 400px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 居中顯示整體 */
            justify-content: center; 
            margin-top: 30px; /* 與倒數保持距離 */
            z-index: 5;
        }

        /* 1. 血條 */
        .hp-container {
            position: absolute;
            top: 0; /* 位於容器最上方 */
            width: 95%;
            height: clamp(20px, 4vw, 30px);
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            border: 2px solid #475569;
            overflow: hidden;
            backdrop-filter: blur(2px);
            z-index: 25;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            width: 100%;
            transition: width 0.2s;
        }
        .hp-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(10px, 3vw, 16px);
            font-weight: bold; color: white;
            text-shadow: 1px 1px 2px black;
            z-index: 2;
        }

        /* 2. 怪物本體 */
        .monster-sprite {
            position: absolute;
            top: 40px; /* 血條下方 */
            font-size: clamp(60px, 15vw, 100px);
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            z-index: 20;
        }
        .monster-sprite:active { transform: scale(0.9); }

        /* 3. 題目圖片 */
        .music-overlay {
            position: absolute;
            top: 160px; /* 怪物下方 */
            left: 0;
            width: 100%;
            height: auto;
            /* 讓圖片高度自動延伸，填滿下方空間，但不超過容器底部太多 */
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            z-index: 15;
            pointer-events: none;
        }

        .music-image {
            width: 95%;
            height: auto;
            /* 平板上可以更高 */
            max-height: 350px; 
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }

        /* --- 鋼琴鍵盤 --- */
        #piano-deck {
            /* 關鍵修正：底部 Padding 確保不被導航欄擋住 */
            padding: 10px 10px calc(var(--nav-height) + 30px) 10px; 
            
            background: linear-gradient(0deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            gap: 1vw;
            z-index: 20;
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            height: auto;
            /* 最小高度，防止在橫屏平板太矮 */
            min-height: 160px; 
            flex-shrink: 0;
        }

        .piano-key {
            flex: 1;
            max-width: 80px;
            min-width: 30px;
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569;
            border-radius: 0 0 8px 8px;
            color: #94a3b8;
            font-size: clamp(14px, 3vw, 24px);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            box-shadow: 0 5px 0 #020617;
            transition: transform 0.1s;
            cursor: pointer;
            position: relative;
        }

        .piano-key::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .piano-key:active, .piano-key.active {
            transform: translateY(5px) scale(0.98);
            box-shadow: 0 0 0 #020617;
            background: var(--primary);
            color: white;
        }

        .piano-key .sub-text { font-size: clamp(8px, 2vw, 12px); margin-bottom: 5px; opacity: 0.7; }

        /* --- 底部導航 --- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            padding-bottom: var(--safe-bottom);
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            font-size: clamp(10px, 2vw, 12px);
            cursor: pointer;
            width: 100%;
            height: 100%;
            justify-content: center;
        }
        .nav-icon {
            font-size: clamp(20px, 5vw, 28px);
            background: rgba(255,255,255,0.05);
            width: clamp(36px, 8vw, 48px); 
            height: clamp(36px, 8vw, 48px);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 4px;
        }
        .nav-btn.active .nav-icon {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        .nav-btn.active { color: white; }

        /* --- 升級面板 --- */
        #upgrade-drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 75%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-bottom: var(--safe-bottom);
        }
        #upgrade-drawer.open { bottom: 0; }

        .drawer-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .drawer-title { 
            font-family: 'Orbitron', 'Russo One'; 
            font-size: 24px; 
            color: var(--hero-color); 
        }
        .close-btn { background: rgba(255,255,255,0.1); border: none; width: 36px; height: 36px; border-radius: 50%; color: white; cursor: pointer; font-size: 20px;}

        .upgrade-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        
        .upgrade-item {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info h3 { margin: 0; font-size: 18px; color: var(--primary); }
        .item-info p { margin: 5px 0 0; font-size: 14px; color: #94a3b8; }

        .btn-upgrade {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            min-width: 100px;
        }
        .btn-upgrade:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        .damage-number {
            position: absolute;
            font-family: 'Russo One', sans-serif;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
            pointer-events: none;
            animation: damageFly 1s forwards;
            z-index: 50;
            font-size: clamp(16px, 5vw, 32px);
        }
        .crit { color: var(--gold); font-size: 1.5em; text-shadow: 0 0 10px var(--gold); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes damageFly { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(-30px) scale(1.2); opacity: 1; } 100% { transform: translateY(-80px) scale(1); opacity: 0; } }

        .text-gold { color: var(--gold); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="hero-title-container">
            <h1 class="hero-title">HeroGo</h1>
            <div class="hero-subtitle">Rhythm Titans</div>
        </div>
        
        <div class="stats-container">
            <div class="resource-box">
                <span class="icon">⚔️</span>
                <div>
                    <span class="label">STAGE</span>
                    <span class="value" id="header-stage">1</span>
                </div>
            </div>
            <div class="resource-box">
                <span class="icon">⚡</span>
                <div>
                    <span class="label">DPS</span>
                    <span class="value" id="header-dps">0</span>
                </div>
            </div>
            <div class="resource-box" style="border-color: rgba(251, 191, 36, 0.3);">
                <span class="icon">💰</span>
                <div>
                    <span class="label">GOLD</span>
                    <span class="value text-gold" id="header-gold">0</span>
                </div>
            </div>
        </div>
    </header>

    <section id="game-stage">
        <div class="stage-indicator">STAGE <span id="bg-stage-num">1</span></div>
        
        <!-- 1. 倒數 (置頂) -->
        <div id="boss-timer-bar"><div id="boss-timer-fill"></div></div>

        <div class="monster-wrapper">
            <!-- 2. 血條 (最上方) -->
            <div class="hp-container">
                <div class="hp-fill" id="hp-bar"></div>
                <div class="hp-text"><span id="hp-current">10</span> / <span id="hp-max">10</span></div>
            </div>

            <!-- 3. 怪物 (血條下方) -->
            <div class="monster-sprite" id="monster-visual" onclick="tapDamage()">👾</div>

            <!-- 4. 題目 (怪物下方) -->
            <div class="music-overlay" id="music-overlay">
                <img class="music-image" id="music-image" src="" alt="Music notation">
            </div>
        </div>
    </section>

    <!-- 鋼琴鍵盤 -->
    <section id="piano-deck">
        <button class="piano-key" onclick="handleInput('C')"><span class="sub-text">Do</span>C</button>
        <button class="piano-key" onclick="handleInput('D')"><span class="sub-text">Re</span>D</button>
        <button class="piano-key" onclick="handleInput('E')"><span class="sub-text">Mi</span>E</button>
        <button class="piano-key" onclick="handleInput('F')"><span class="sub-text">Fa</span>F</button>
        <button class="piano-key" onclick="handleInput('G')"><span class="sub-text">Sol</span>G</button>
        <button class="piano-key" onclick="handleInput('A')"><span class="sub-text">La</span>A</button>
        <button class="piano-key" onclick="handleInput('B')"><span class="sub-text">Si</span>B</button>
    </section>

    <!-- 底部導航 -->
    <nav>
        <button class="nav-btn active">
            <div class="nav-icon">🎮</div>
            <span>戰鬥</span>
        </button>
        <button class="nav-btn" onclick="toggleDrawer()">
            <div class="nav-icon">🛠️</div>
            <span>升級</span>
        </button>
        <button class="nav-btn">
            <div class="nav-icon">🏆</div>
            <span>排行</span>
        </button>
    </nav>

    <!-- 升級面板 -->
    <aside id="upgrade-drawer">
        <div class="drawer-header">
            <span class="drawer-title">裝備升級</span>
            <button class="close-btn" onclick="toggleDrawer()">✕</button>
        </div>
        <div class="upgrade-scroll" id="upgrade-list"></div>
    </aside>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        const MONSTERS = ['👾', '👹', '👻', '🤖', '🦖', '👽', '💀', '🧟'];
        const CLEFS = [
            { symbol: 'treble', name: 'Treble' }, 
            { symbol: 'bass', name: 'Bass' }     
        ];
        
        const noteMapping = {
            "IMG_2528.jpeg": "C4",
            "IMG_2529.jpeg": "D4",
            "IMG_2530.jpeg": "E4",
            "IMG_2531.jpeg": "F4",
            "IMG_2532.jpeg": "G4",
            "IMG_2533.jpeg": "A4",
            "IMG_2534.jpeg": "B4",
            "IMG_2535.jpeg": "C5",
            "IMG_2536.jpeg": "D5",
            "IMG_2537.jpeg": "E5",
            "IMG_2538.jpeg": "F5",
            "IMG_2539.jpeg": "G5",
            "IMG_2540.jpeg": "A5",
            "IMG_2541.jpeg": "B5",
            "IMG_2542.jpeg": "C6"
        };

        const GameState = {
            gold: 0,
            stage: 1,
            monsterHp: 10,
            monsterMaxHp: 10,
            isBoss: false,
            bossTimer: 30,
            bossMaxTime: 30,
            currentNote: 'C4',
            currentClef: CLEFS[0],
            lastAutoTime: 0
        };

        const PlayerStats = {
            baseDamage: 5,
            autoDPS: 10,
            critChance: 0.1,
            critMult: 2.5,
            goldMult: 1
        };

        const Upgrades = [
            { id: 'sword', name: '光之節拍劍', desc: '點擊與答題傷害 +5', level: 1, baseCost: 20, costFactor: 1.15, effect: () => { PlayerStats.baseDamage += 5; } },
            { id: 'auto', name: '自動演奏機', desc: '每秒自動傷害 +15', level: 1, baseCost: 100, costFactor: 1.2, effect: () => { PlayerStats.autoDPS += 15; } },
            { id: 'crit', name: '狂暴節奏', desc: '暴擊率 +5%, 暴擊傷害 +0.5', level: 0, baseCost: 200, costFactor: 1.5, effect: () => { PlayerStats.critChance += 0.05; PlayerStats.critMult += 0.5; } },
            { id: 'gold', name: '搖滾天后', desc: '金幣獲取 +20%', level: 0, baseCost: 150, costFactor: 1.4, effect: () => { PlayerStats.goldMult += 0.2; } }
        ];

        function init() {
            document.querySelectorAll('img').forEach(img => {
                img.onerror = function() {
                    this.style.display = 'none';
                    console.error('圖片加載失敗，已隱藏:', this.src);
                };
            });

            spawnMonster();
            renderUpgrades();
            initParticles();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            if (timestamp - GameState.lastAutoTime > 1000) {
                if (GameState.monsterHp > 0) {
                    dealDamage(PlayerStats.autoDPS, false, false);
                }
                GameState.lastAutoTime = timestamp;

                if (GameState.isBoss) {
                    GameState.bossTimer--;
                    const pct = (GameState.bossTimer / GameState.bossMaxTime) * 100;
                    document.getElementById('boss-timer-fill').style.width = pct + '%';
                    
                    if (GameState.bossTimer <= 0) {
                        respawnBoss(); 
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function spawnMonster() {
            const growth = 1.55;
            let hp = 15 * Math.pow(growth, GameState.stage - 1);

            if (GameState.stage % 5 === 0) {
                GameState.isBoss = true;
                hp *= 10;
                GameState.bossTimer = 30;
                GameState.bossMaxTime = 30;
                document.getElementById('boss-timer-bar').style.opacity = 1;
                document.getElementById('monster-visual').innerText = '👹'; 
            } else {
                GameState.isBoss = false;
                document.getElementById('boss-timer-bar').style.opacity = 0;
                document.getElementById('monster-visual').innerText = MONSTERS[Math.floor(Math.random() * MONSTERS.length)];
            }

            GameState.monsterMaxHp = Math.floor(hp);
            GameState.monsterHp = GameState.monsterMaxHp;
            
            generateQuiz();
            updateUI();
        }

        function respawnBoss() {
            showToast("BOSS 重生！");
            GameState.bossTimer = GameState.bossMaxTime;
            GameState.monsterHp = GameState.monsterMaxHp;
        }

        function generateQuiz() {
            GameState.currentClef = CLEFS[Math.floor(Math.random() * CLEFS.length)];
            
            const imgFileNames = Object.keys(noteMapping);
            const randomFileName = imgFileNames[Math.floor(Math.random() * imgFileNames.length)];
            GameState.currentNote = noteMapping[randomFileName];
            
            const imageUrl = `images/treble/${randomFileName}`;
            
            const imgElement = document.getElementById('music-image');
            imgElement.src = imageUrl;
        }

        function tapDamage() {
            const dmg = Math.floor(PlayerStats.baseDamage * 0.2);
            dealDamage(dmg, false, true);
            playSound('hit');
        }

        function handleInput(note) {
            const btn = document.querySelector(`.piano-key[onclick="handleInput('${note}')"]`);
            if(btn) {
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 100);
            }

            const noteWithoutOctave = note; 
            const currentNoteWithoutOctave = GameState.currentNote.substring(0, 1);
            
            if (noteWithoutOctave === currentNoteWithoutOctave) {
                let dmg = PlayerStats.baseDamage;
                const isCrit = Math.random() < PlayerStats.critChance;
                if (isCrit) dmg *= PlayerStats.critMult;
                
                dealDamage(Math.floor(dmg), isCrit, true);
                generateQuiz(); 
            } else {
                showToast("音準偏差！");
            }
        }

        function dealDamage(amount, isCrit, isPlayerAction) {
            GameState.monsterHp -= amount;
            
            showDamageNumber(amount, isCrit);
            if (isPlayerAction) playSound('hit');

            if (GameState.monsterHp <= 0) {
                onMonsterDeath();
            }
            updateUI();
        }

        function onMonsterDeath() {
            const goldGain = Math.floor(Math.sqrt(GameState.monsterMaxHp) * (1 + PlayerStats.goldMult));
            GameState.gold += goldGain;
            
            playSound('coin');
            showToast(`擊殺! +${formatNumber(goldGain)} G`);
            
            GameState.stage++;
            spawnMonster();
            renderUpgrades();
        }

        function updateUI() {
            document.getElementById('header-stage').innerText = GameState.stage;
            document.getElementById('bg-stage-num').innerText = GameState.stage;
            document.getElementById('header-gold').innerText = formatNumber(GameState.gold);
            document.getElementById('header-dps').innerText = formatNumber(Math.floor(PlayerStats.autoDPS));

            const hpPct = Math.max(0, (GameState.monsterHp / GameState.monsterMaxHp) * 100);
            document.getElementById('hp-bar').style.width = hpPct + '%';
            document.getElementById('hp-current').innerText = formatNumber(GameState.monsterHp);
            document.getElementById('hp-max').innerText = formatNumber(GameState.monsterMaxHp);
        }

        function showDamageNumber(amount, isCrit) {
            const el = document.createElement('div');
            el.className = `damage-number ${isCrit ? 'crit' : ''}`;
            el.innerText = formatNumber(amount);
            
            const rect = document.querySelector('.monster-wrapper').getBoundingClientRect();
            const x = rect.left + rect.width/2 + (Math.random()-0.5)*100;
            const y = rect.top + rect.height/3; // 稍微靠上避免擋住題目
            
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function toggleDrawer() {
            const drawer = document.getElementById('upgrade-drawer');
            drawer.classList.toggle('open');
        }

        function renderUpgrades() {
            const list = document.getElementById('upgrade-list');
            list.innerHTML = '';
            
            Upgrades.forEach((u, idx) => {
                const cost = Math.floor(u.baseCost * Math.pow(u.costFactor, u.level));
                const canBuy = GameState.gold >= cost;
                
                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.innerHTML = `
                    <div class="item-info">
                        <h3>${u.name} <span style="font-size:12px;color:#666">Lv.${u.level}</span></h3>
                        <p>${u.desc}</p>
                    </div>
                    <button class="btn-upgrade" onclick="buyUpgrade(${idx})" ${!canBuy ? 'disabled' : ''}>
                        ⚡ ${formatNumber(cost)}
                    </button>
                `;
                list.appendChild(item);
            });
        }

        function buyUpgrade(idx) {
            const u = Upgrades[idx];
            const cost = Math.floor(u.baseCost * Math.pow(u.costFactor, u.level));
            
            if (GameState.gold >= cost) {
                GameState.gold -= cost;
                u.level++;
                u.effect();
                updateUI();
                renderUpgrades();
                playSound('hit');
            }
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return Math.floor(num);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
                border-radius: 30px; z-index: 300; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
                animation: popIn 0.3s; pointer-events: none; text-align: center;
                font-size: clamp(14px, 4vw, 20px);
            `;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function initParticles() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * Math.PI * 2,
                    s: Math.random() * 0.8 + 0.2,
                    color: `hsl(${Math.random() * 60 + 200}, 70%, 60%)`
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    p.y -= p.s;
                    p.x += Math.sin(p.d) * 0.5;
                    if(p.y < -10) p.y = canvas.height + 10;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        init();
    </script>
</body>
</html>
