<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>HeroGo - Rhythm Titans</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+TC:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --gold: #fbbf24;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --hero-color: #ec4899;
            --hero-secondary: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--text-main);
        }

        body {
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 60%, #000000 100%);
        }

        button, input, textarea, select {
            font-size: 16px;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.5;
        }

        header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 20;
            position: relative;
            flex-shrink: 0;
        }

        .hero-title-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 25;
        }

        .hero-title {
            font-family: 'Orbitron', 'Russo One', sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: var(--hero-color);
            text-shadow: 0 0 25px rgba(236, 72, 153, 0.7);
            letter-spacing: 3px;
            margin: 0;
            line-height: 1;
        }

        .hero-subtitle {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .resource-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 10px;
            border: var(--glass-border);
            backdrop-filter: blur(4px);
            margin: 0 8px;
            flex-shrink: 0;
        }

        .icon {
            font-size: 18px;
            margin-right: 8px;
        }

        .label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .value {
            font-family: 'Russo One', sans-serif;
            font-size: 16px;
            color: #fff;
        }

        #game-stage {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .stage-indicator {
            position: absolute;
            top: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 28px;
            color: rgba(255,255,255,0.08);
            font-weight: 900;
        }

        #boss-timer-bar {
            position: absolute;
            top: 40px;
            width: 150px;
            height: 5px;
            background: rgba(255, 0, 0, 0.2);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(255, 0, 0, 0.4);
        }

        #boss-timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f87171);
            width: 100%;
            box-shadow: 0 0 10px #ef4444;
        }

        .monster-wrapper {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hp-container {
            position: absolute;
            top: -25px;
            width: 200%;
            height: 22px;
            background: rgba(0,0,0,0.6);
            border-radius: 11px;
            border: 2px solid #475569;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            width: 100%;
            box-shadow: 0 0 10px #ef4444;
            transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .hp-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            z-index: 2;
        }

        .monster-sprite {
            font-size: 120px;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.05s;
            position: relative;
            z-index: 5;
            -webkit-user-select: none;
        }

        .monster-sprite:active {
            transform: scale(0.92);
        }

        .music-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .music-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
            border: 2px solid rgba(59, 130, 246, 0.6);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            image-rendering: -webkit-optimize-contrast;
        }

        #piano-deck {
            height: 140px;
            background: linear-gradient(0deg, #1e293b 0%, #0f172a 100%);
            padding: 8px;
            display: flex;
            justify-content: center;
            gap: 6px;
            z-index: 20;
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
            flex-shrink: 0;
        }

        .piano-key {
            flex: 1;
            max-width: 50px;
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569;
            border-radius: 0 0 6px 6px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 12px;
            box-shadow: 0 3px 0 #020617;
            transition: all 0.08s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            -webkit-user-select: none;
        }

        .piano-key::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .piano-key .sub-text {
            font-size: 9px;
            margin-bottom: 3px;
            opacity: 0.6;
        }

        .piano-key:active,
        .piano-key.active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #020617;
            background: var(--primary);
            color: white;
            border-color: #60a5fa;
        }

        .piano-key:active .sub-text,
        .piano-key.active .sub-text {
            color: rgba(255,255,255,0.8);
        }

        nav {
            height: 60px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 30;
            position: relative;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            font-size: 9px;
            gap: 3px;
            cursor: pointer;
            transition: color 0.3s;
            -webkit-user-select: none;
            padding: 8px 16px;
        }

        .nav-icon {
            font-size: 20px;
            background: rgba(255,255,255,0.05);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .nav-btn.active .nav-icon {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .nav-btn.active {
            color: white;
        }

        #upgrade-drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 80%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #upgrade-drawer.open {
            bottom: 0;
        }

        .drawer-header {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .drawer-title {
            font-family: 'Orbitron', 'Russo One';
            font-size: 22px;
            color: var(--hero-color);
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.3);
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .close-btn:active {
            background: rgba(255,255,255,0.2);
        }

        .upgrade-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .upgrade-item {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info h3 {
            margin: 0;
            font-size: 15px;
            color: var(--primary);
        }

        .item-info p {
            margin: 4px 0 0;
            font-size: 11px;
            color: #94a3b8;
        }

        .item-info .level {
            font-size: 11px;
            color: #666;
        }

        .btn-upgrade {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            white-space: nowrap;
            min-width: 80px;
            transition: all 0.2s;
        }

        .btn-upgrade:active {
            transform: scale(0.95);
        }

        .btn-upgrade:disabled {
            background: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
        }

        .damage-number {
            position: fixed;
            font-family: 'Russo One', sans-serif;
            font-weight: 900;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
            pointer-events: none;
            animation: damageFly 0.8s forwards;
            z-index: 50;
        }

        .damage-number.crit {
            color: var(--gold);
            font-size: 28px;
            text-shadow: 0 0 12px var(--gold);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes damageFly {
            0% { transform: translateY(0) scale(0.4); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-70px) scale(0.8); opacity: 0; }
        }

        .text-gold { color: var(--gold); }
        .hidden { display: none !important; }

        .upgrade-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .upgrade-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }

        .upgrade-scroll::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 3px;
        }

        .upgrade-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.7);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="hero-title-container">
            <h1 class="hero-title">HeroGo</h1>
            <div class="hero-subtitle">Rhythm Titans</div>
        </div>

        <div class="resource-box">
            <span class="icon">⚔️</span>
            <div>
                <span class="label">STAGE</span>
                <span class="value" id="header-stage">1</span>
            </div>
        </div>
        <div class="resource-box">
            <span class="icon">⚡</span>
            <div>
                <span class="label">DPS</span>
                <span class="value" id="header-dps">0</span>
            </div>
        </div>
        <div class="resource-box" style="border-color: rgba(251, 191, 36, 0.3);">
            <span class="icon">💰</span>
            <div>
                <span class="label">GOLD</span>
                <span class="value text-gold" id="header-gold">0</span>
            </div>
        </div>
    </header>

    <section id="game-stage">
        <div class="stage-indicator">STAGE <span id="bg-stage-num">1</span></div>

        <div id="boss-timer-bar">
            <div id="boss-timer-fill"></div>
        </div>

        <div class="monster-wrapper">
            <div class="hp-container">
                <div class="hp-fill" id="hp-bar"></div>
                <div class="hp-text">
                    <span id="hp-current">10</span> / <span id="hp-max">10</span>
                </div>
            </div>

            <div class="monster-sprite" id="monster-visual" onclick="tapDamage()">👾</div>

            <div class="music-overlay" id="music-overlay">
                <img class="music-image" src="" alt="音符譜號">
            </div>
        </div>
    </section>

    <section id="piano-deck">
        <button class="piano-key" onclick="handleInput('C')">
            <span class="sub-text">Do</span>C
        </button>
        <button class="piano-key" onclick="handleInput('D')">
            <span class="sub-text">Re</span>D
        </button>
        <button class="piano-key" onclick="handleInput('E')">
            <span class="sub-text">Mi</span>E
        </button>
        <button class="piano-key" onclick="handleInput('F')">
            <span class="sub-text">Fa</span>F
        </button>
        <button class="piano-key" onclick="handleInput('G')">
            <span class="sub-text">Sol</span>G
        </button>
        <button class="piano-key" onclick="handleInput('A')">
            <span class="sub-text">La</span>A
        </button>
        <button class="piano-key" onclick="handleInput('B')">
            <span class="sub-text">Si</span>B
        </button>
    </section>

    <nav>
        <button class="nav-btn active">
            <div class="nav-icon">🎮</div>
            <span>戰鬥</span>
        </button>
        <button class="nav-btn" onclick="toggleDrawer()">
            <div class="nav-icon">🛠️</div>
            <span>升級</span>
        </button>
        <button class="nav-btn">
            <div class="nav-icon">🏆</div>
            <span>排行</span>
        </button>
    </nav>

    <aside id="upgrade-drawer">
        <div class="drawer-header">
            <span class="drawer-title">裝備升級</span>
            <button class="close-btn" onclick="toggleDrawer()">✕</button>
        </div>
        <div class="upgrade-scroll" id="upgrade-list"></div>
    </aside>

    <script>
        // ===== 遊戲數據與配置 =====
        const MONSTERS = ['👾', '👹', '👻', '🤖', '🦖', '👽', '💀', '🧟'];
        
        // 圖片映射：IMG編號 → 完整音符（包含八度）
        const IMG_NOTE_MAPPING = {
            '2528': { note: 'C', octave: 4, full: 'C4' },
            '2529': { note: 'D', octave: 4, full: 'D4' },
            '2530': { note: 'E', octave: 4, full: 'E4' },
            '2531': { note: 'F', octave: 4, full: 'F4' },
            '2532': { note: 'G', octave: 4, full: 'G4' },
            '2533': { note: 'A', octave: 4, full: 'A4' },
            '2534': { note: 'B', octave: 4, full: 'B4' },
            '2535': { note: 'C', octave: 5, full: 'C5' },
            '2536': { note: 'D', octave: 5, full: 'D5' },
            '2537': { note: 'E', octave: 5, full: 'E5' },
            '2538': { note: 'F', octave: 5, full: 'F5' },
            '2539': { note: 'G', octave: 5, full: 'G5' },
            '2540': { note: 'A', octave: 5, full: 'A5' },
            '2541': { note: 'B', octave: 5, full: 'B5' },
            '2542': { note: 'C', octave: 6, full: 'C6' }
        };

        const GameState = {
            gold: 0,
            stage: 1,
            monsterHp: 100,
            monsterMaxHp: 100,
            isBoss: false,
            bossTimer: 0,
            bossMaxTime: 30,
            currentNoteData: null,
            lastAutoTime: 0,
            totalDamageDealt: 0
        };

        const PlayerStats = {
            baseDamage: 1,
            autoDPS: 0.5,
            critChance: 0.05,
            critMult: 2,
            goldMult: 1
        };

        const Upgrades = [
            {
                id: 'sword',
                name: '光之劍',
                desc: '點擊與答題傷害',
                level: 0,
                baseCost: 10,
                costFactor: 1.07,
                damagePerLevel: 1,
                effect: function() {
                    PlayerStats.baseDamage += this.damagePerLevel;
                }
            },
            {
                id: 'auto',
                name: '自動演奏',
                desc: '每秒自動傷害',
                level: 0,
                baseCost: 50,
                costFactor: 1.08,
                damagePerLevel: 0.25,
                effect: function() {
                    PlayerStats.autoDPS += this.damagePerLevel;
                }
            },
            {
                id: 'crit',
                name: '狂暴節奏',
                desc: '暴擊率 +1%, 傷害 +10%',
                level: 0,
                baseCost: 150,
                costFactor: 1.12,
                effect: function() {
                    PlayerStats.critChance += 0.01;
                    PlayerStats.baseDamage *= 1.1;
                    PlayerStats.autoDPS *= 1.1;
                }
            },
            {
                id: 'gold',
                name: '金幣技能',
                desc: '獲金量 +15%',
                level: 0,
                baseCost: 100,
                costFactor: 1.1,
                effect: function() {
                    PlayerStats.goldMult += 0.15;
                }
            }
        ];

        // ===== 遊戲初始化 =====
        function init() {
            spawnMonster();
            renderUpgrades();
            initParticles();
            requestAnimationFrame(gameLoop);
        }

        // ===== 主遊戲循環 =====
        let lastFrameTime = 0;
        
        function gameLoop(timestamp) {
            if (!lastFrameTime) lastFrameTime = timestamp;
            const deltaTime = (timestamp - lastFrameTime) / 1000;
            lastFrameTime = timestamp;

            const autoDamage = PlayerStats.autoDPS * deltaTime;
            if (autoDamage > 0.01 && GameState.monsterHp > 0) {
                dealDamage(autoDamage, false, false);
            }

            if (GameState.isBoss && GameState.bossTimer > 0) {
                GameState.bossTimer -= deltaTime;
                const pct = Math.max(0, (GameState.bossTimer / GameState.bossMaxTime) * 100);
                document.getElementById('boss-timer-fill').style.width = pct + '%';

                if (GameState.bossTimer <= 0) {
                    respawnBoss();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // ===== 怪物邏輯 =====
        function calculateMonsterHp(stage) {
            return Math.floor(10 * Math.pow(1.52, stage - 1));
        }

        function calculateGoldReward(stage, monsterMaxHp) {
            const baseGold = Math.sqrt(monsterMaxHp) * 0.8;
            const goldMult = 1 + (stage * 0.02);
            return Math.floor(baseGold * goldMult * PlayerStats.goldMult);
        }

        function spawnMonster() {
            const hp = calculateMonsterHp(GameState.stage);
            GameState.monsterMaxHp = hp;
            GameState.monsterHp = hp;

            if (GameState.stage % 5 === 0) {
                GameState.isBoss = true;
                GameState.monsterHp *= 10;
                GameState.monsterMaxHp *= 10;
                GameState.bossTimer = GameState.bossMaxTime;
                document.getElementById('boss-timer-bar').style.opacity = 1;
                document.getElementById('monster-visual').innerText = '👹';
            } else {
                GameState.isBoss = false;
                document.getElementById('boss-timer-bar').style.opacity = 0;
                document.getElementById('monster-visual').innerText = MONSTERS[GameState.stage % MONSTERS.length];
            }

            generateQuiz();
            updateUI();
        }

        function respawnBoss() {
            showToast('⏰ BOSS 重生！');
            GameState.bossTimer = GameState.bossMaxTime;
            GameState.monsterHp = GameState.monsterMaxHp;
        }

        function generateQuiz() {
            // 隨機選擇一個IMG編號 (2528-2542)
            const imgNumbers = Object.keys(IMG_NOTE_MAPPING);
            const randomImgNum = imgNumbers[Math.floor(Math.random() * imgNumbers.length)];
            const noteData = IMG_NOTE_MAPPING[randomImgNum];
            
            GameState.currentNoteData = {
                imgNum: randomImgNum,
                note: noteData.note,
                octave: noteData.octave,
                full: noteData.full
            };

            // 載入圖片
            const imageUrl = `images/treble/IMG_${randomImgNum}.jpeg`;
            const musicOverlay = document.getElementById('music-overlay');
            
            // 清空容器
            musicOverlay.innerHTML = '';
            
            // 創建圖片元素
            const img = document.createElement('img');
            img.className = 'music-image';
            img.src = imageUrl;
            img.alt = `音符 ${noteData.full}`;
            
            // 成功載入時
            img.onload = function() {
                console.log('✓ 圖片加載成功:', imageUrl);
            };
            
            // 載入失敗時顯示備用方案
            img.onerror = function() {
                console.error('✗ 圖片加載失敗:', imageUrl);
                musicOverlay.innerHTML = `
                    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 8px; border: 2px solid rgba(255,100,100,0.6);">
                        <span style="font-size: 28px; font-weight: bold; color: #ef4444; font-family: 'Russo One', sans-serif;">${noteData.full}</span>
                        <span style="font-size: 12px; color: #94a3b8; margin-top: 8px;">圖片未找到</span>
                    </div>
                `;
            };
            
            musicOverlay.appendChild(img);
            console.log('加載音符:', noteData.full, '(IMG_' + randomImgNum + ')');
        }

        // ===== 傷害與交互 =====
        function tapDamage() {
            const dmg = PlayerStats.baseDamage * 0.1;
            const isCrit = Math.random() < PlayerStats.critChance;
            dealDamage(isCrit ? dmg * PlayerStats.critMult : dmg, isCrit, true);
        }

        function handleInput(note) {
            const buttons = document.querySelectorAll('.piano-key');
            buttons.forEach(btn => {
                if (btn.innerText.includes(note)) {
                    btn.classList.add('active');
                    setTimeout(() => btn.classList.remove('active'), 100);
                }
            });

            if (GameState.currentNoteData && note === GameState.currentNoteData.note) {
                let dmg = PlayerStats.baseDamage;
                const isCrit = Math.random() < PlayerStats.critChance;
                if (isCrit) dmg *= PlayerStats.critMult;

                dealDamage(dmg, isCrit, true);
                generateQuiz();
            } else {
                showToast('❌ 音準偏差！');
            }
        }

        function dealDamage(amount, isCrit, isPlayerAction) {
            if (GameState.monsterHp <= 0) return;

            GameState.monsterHp = Math.max(0, GameState.monsterHp - amount);
            GameState.totalDamageDealt += amount;

            if (isPlayerAction) {
                showDamageNumber(amount, isCrit);
            }

            updateUI();

            if (GameState.monsterHp <= 0) {
                onMonsterDeath();
            }
        }

        function onMonsterDeath() {
            const goldGain = calculateGoldReward(GameState.stage, GameState.monsterMaxHp);
            GameState.gold += goldGain;

            showToast(`✨ 擊殺! +${formatNumber(goldGain)} G`);

            GameState.stage++;
            spawnMonster();
            renderUpgrades();
        }

        // ===== UI 更新 =====
        function updateUI() {
            document.getElementById('header-stage').innerText = GameState.stage;
            document.getElementById('bg-stage-num').innerText = GameState.stage;
            document.getElementById('header-gold').innerText = formatNumber(GameState.gold);
            document.getElementById('header-dps').innerText = formatNumber(PlayerStats.autoDPS + PlayerStats.baseDamage * 2);

            const hpPct = Math.max(0, (GameState.monsterHp / GameState.monsterMaxHp) * 100);
            document.getElementById('hp-bar').style.width = hpPct + '%';
            document.getElementById('hp-current').innerText = formatNumber(GameState.monsterHp);
            document.getElementById('hp-max').innerText = formatNumber(GameState.monsterMaxHp);
        }

        function showDamageNumber(amount, isCrit) {
            const el = document.createElement('div');
            el.className = `damage-number ${isCrit ? 'crit' : ''}`;
            el.innerText = formatNumber(amount);

            const rect = document.querySelector('.monster-wrapper').getBoundingClientRect();
            const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 80;
            const y = rect.top + rect.height / 2;

            el.style.left = x + 'px';
            el.style.top = y + 'px';

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function toggleDrawer() {
            const drawer = document.getElementById('upgrade-drawer');
            drawer.classList.toggle('open');
        }

        // ===== 升級系統 =====
        function renderUpgrades() {
            const list = document.getElementById('upgrade-list');
            list.innerHTML = '';

            Upgrades.forEach((u, idx) => {
                const cost = Math.floor(u.baseCost * Math.pow(u.costFactor, u.level));
                const canBuy = GameState.gold >= cost;

                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.innerHTML = `
                    <div class="item-info">
                        <h3>${u.name} <span class="level">Lv.${u.level}</span></h3>
                        <p>${u.desc}</p>
                    </div>
                    <button class="btn-upgrade" data-idx="${idx}" ${!canBuy ? 'disabled' : ''}>
                        ${formatNumber(cost)}
                    </button>
                `;
                
                const btn = item.querySelector('.btn-upgrade');
                btn.onclick = () => buyUpgrade(idx);
                list.appendChild(item);
            });
        }

        function buyUpgrade(idx) {
            const u = Upgrades[idx];
            const cost = Math.floor(u.baseCost * Math.pow(u.costFactor, u.level));

            if (GameState.gold < cost) {
                showToast(`💰 金幣不足！還差 ${formatNumber(cost - GameState.gold)}`);
                return;
            }

            GameState.gold -= cost;
            u.level++;
            u.effect();
            updateUI();
            renderUpgrades();
            showToast(`✨ 升級成功！${u.name} Lv.${u.level}`);
        }

        // ===== 輔助功能 =====
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return Math.floor(num);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 40%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.85);
                color: white;
                padding: 12px 24px;
                border-radius: 20px;
                z-index: 200;
                font-weight: bold;
                animation: popIn 0.3s;
                pointer-events: none;
                border: 1px solid rgba(139, 92, 246, 0.5);
                backdrop-filter: blur(10px);
            `;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        // ===== 背景粒子效果 =====
        function initParticles() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const particleCount = Math.min(40, Math.floor(window.innerWidth / 10));

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 0.5,
                    vy: Math.random() * 0.5 + 0.3,
                    vx: (Math.random() - 0.5) * 0.3,
                    color: `hsl(${Math.random() * 60 + 200}, 70%, 50%)`
                });
            }

            let animationId;

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 0.6;
                    ctx.fill();

                    p.y -= p.vy;
                    p.x += p.vx;

                    if (p.y < -10) {
                        p.y = canvas.height + 10;
                        p.x = Math.random() * canvas.width;
                    }
                });

                ctx.globalAlpha = 1;
                animationId = requestAnimationFrame(draw);
            }

            draw();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // 防止雙擊縮放
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // 啟動遊戲
        init();
    </script>
</body>
</html>
