<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeroGo - Rhythm Titans</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+TC:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6;     /* 劍/點擊 - 藍色 */
            --secondary: #10b981;   /* 英雄/DPS - 翠綠 */
            --accent: #8b5cf6;      /* 寵物/輔助 - 紫色 */
            --gold: #fbbf24;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --hero-color: #ec4899; 
            --nav-height: 70px; 
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 60%, #000000 100%);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--nav-height); 
            cursor: pointer;
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- 頂部儀表板 --- */
        header {
            flex-shrink: 0;
            min-height: 100px;
            padding: 10px 20px 5px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(15, 23, 42, 0.4) 100%, transparent 100%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-title-container {
            text-align: center;
            margin-bottom: 8px;
        }

        .hero-title {
            font-family: 'Orbitron', 'Russo One', sans-serif;
            font-weight: 900;
            font-size: clamp(24px, 5vw, 36px);
            color: var(--hero-color);
            text-shadow: 0 0 25px rgba(236, 72, 153, 0.7);
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: clamp(10px, 2.5vw, 14px);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .stats-container {
            display: flex;
            gap: clamp(5px, 1vw, 15px);
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        .resource-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 12px;
            border: var(--glass-border);
            backdrop-filter: blur(4px);
            flex: 1;
            justify-content: center;
            min-width: 80px;
        }

        .icon { font-size: clamp(16px, 4vw, 24px); margin-right: 8px; }
        .label { font-size: clamp(8px, 2vw, 12px); color: #94a3b8; text-transform: uppercase; display: block; }
        .value { font-family: 'Russo One', sans-serif; font-size: clamp(14px, 4vw, 20px); color: #fff; }

        /* --- 主遊戲區 --- */
        #game-stage {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10px;
            width: 100%;
            padding-bottom: calc(160px + 20px + var(--nav-height)); 
            overflow: hidden;
        }

        .stage-indicator {
            position: absolute;
            top: 40px;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(30px, 10vw, 80px);
            color: rgba(255,255,255,0.05);
            font-weight: 900;
            transform: skew(-10deg);
            z-index: 0;
            pointer-events: none;
        }

        .monster-wrapper {
            position: relative;
            width: 90vw;
            max-width: 600px;
            min-height: 400px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            margin-top: 30px; 
            z-index: 5;
        }

        .hp-container {
            position: absolute;
            top: 0; 
            width: 95%;
            height: clamp(20px, 4vw, 30px);
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            border: 2px solid #475569;
            overflow: hidden;
            backdrop-filter: blur(2px);
            z-index: 25;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            width: 100%;
            transition: width 0.1s;
        }
        .hp-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(10px, 3vw, 16px);
            font-weight: bold; color: white;
            text-shadow: 1px 1px 2px black;
            z-index: 2;
        }

        .monster-sprite {
            position: absolute;
            top: 40px; 
            font-size: clamp(60px, 15vw, 100px);
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.05s;
        }
        .monster-sprite:active { transform: scale(0.9); }

        .music-overlay {
            position: absolute;
            top: 160px; 
            left: 0;
            width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            z-index: 15;
            pointer-events: none;
        }

        .music-image {
            width: 95%;
            height: auto;
            max-height: 350px; 
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }

        /* --- 鋼琴鍵盤 --- */
        #piano-deck {
            padding: 10px 10px calc(var(--nav-height) + 30px) 10px; 
            
            background: linear-gradient(0deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            gap: 1vw;
            z-index: 20;
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            height: auto;
            min-height: 160px; 
            flex-shrink: 0;
        }

        .piano-key {
            flex: 1;
            max-width: 80px;
            min-width: 30px;
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569;
            border-radius: 0 0 8px 8px;
            color: #94a3b8;
            font-size: clamp(14px, 3vw, 24px);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            box-shadow: 0 5px 0 #020617;
            transition: transform 0.1s;
            cursor: pointer;
            position: relative;
        }

        .piano-key::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .piano-key:active, .piano-key.active {
            transform: translateY(5px) scale(0.98);
            box-shadow: 0 0 0 #020617;
            background: var(--primary);
            color: white;
        }

        .piano-key .sub-text { font-size: clamp(8px, 2vw, 12px); margin-bottom: 5px; opacity: 0.7; }

        /* --- 底部導航 --- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            padding-bottom: var(--safe-bottom);
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            font-size: clamp(10px, 2vw, 12px);
            cursor: pointer;
            width: 100%;
            height: 100%;
            justify-content: center;
        }
        .nav-icon {
            font-size: clamp(20px, 5vw, 28px);
            background: rgba(255,255,255,0.05);
            width: clamp(36px, 8vw, 48px); 
            height: clamp(36px, 8vw, 48px);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 4px;
        }
        .nav-btn.active .nav-icon {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        .nav-btn.active { color: white; }

        /* --- 升級面板 --- */
        #upgrade-drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 75%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-bottom: var(--safe-bottom);
        }
        #upgrade-drawer.open { bottom: 0; }

        .drawer-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .drawer-title { 
            font-family: 'Orbitron', 'Russo One'; 
            font-size: 24px; 
            color: var(--hero-color); 
        }
        .close-btn { background: rgba(255,255,255,0.1); border: none; width: 36px; height: 36px; border-radius: 50%; color: white; cursor: pointer; font-size: 20px;}

        .upgrade-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        
        .upgrade-item {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info h3 { margin: 0; font-size: 16px; color: #fff; display: flex; align-items: center; gap: 8px;}
        .item-type { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .type-sword { background: var(--primary); color: white; }
        .type-hero { background: var(--secondary); color: white; }
        .type-pet { background: var(--accent); color: white; }

        .item-info p { margin: 5px 0 0; font-size: 12px; color: #94a3b8; }

        .btn-upgrade {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            min-width: 90px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-upgrade:disabled { background: #334155; color: #64748b; cursor: not-allowed; box-shadow: none; }

        .damage-number {
            position: absolute;
            font-family: 'Russo One', sans-serif;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: damageFly 0.8s ease-out forwards;
            z-index: 50;
            font-size: clamp(16px, 5vw, 32px);
        }
        .crit { 
            color: #fde047; /* Tap Titans 黃色暴擊 */
            font-size: 1.8em; 
            text-shadow: 2px 2px 0px #b45309, 0 0 10px #fde047;
            animation: damageCrit 0.8s ease-out forwards;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes damageFly { 
            0% { transform: translateY(0) scale(0.5); opacity: 0; } 
            20% { transform: translateY(-40px) scale(1.2); opacity: 1; } 
            100% { transform: translateY(-100px) scale(1); opacity: 0; } 
        }
        @keyframes damageCrit {
            0% { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 0; }
            20% { transform: translateY(-40px) scale(1.4) rotate(5deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1) rotate(0deg); opacity: 0; }
        }

        /* 點擊特效 */
        .click-effect {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: ripple 0.3s linear;
            pointer-events: none;
            z-index: 40;
        }

        @keyframes ripple {
            to { transform: scale(1.5); opacity: 0; }
        }

        .text-gold { color: var(--gold); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="hero-title-container">
            <h1 class="hero-title">HeroGo</h1>
            <div class="hero-subtitle">Rhythm Titans</div>
        </div>
        
        <div class="stats-container">
            <div class="resource-box">
                <span class="icon">⚔️</span>
                <div>
                    <span class="label">STAGE</span>
                    <span class="value" id="header-stage">1</span>
                </div>
            </div>
            <div class="resource-box">
                <span class="icon">⚡</span>
                <div>
                    <span class="label">DPS</span>
                    <span class="value" id="header-dps">0</span>
                </div>
            </div>
            <div class="resource-box" style="border-color: rgba(251, 191, 36, 0.3);">
                <span class="icon">💰</span>
                <div>
                    <span class="label">GOLD</span>
                    <span class="value text-gold" id="header-gold">0</span>
                </div>
            </div>
        </div>
    </header>

    <section id="game-stage">
        <div class="stage-indicator">STAGE <span id="bg-stage-num">1</span></div>

        <div class="monster-wrapper">
            <div class="hp-container">
                <div class="hp-fill" id="hp-bar"></div>
                <div class="hp-text"><span id="hp-current">10</span> / <span id="hp-max">10</span></div>
            </div>

            <div class="monster-sprite" id="monster-visual" onclick="handleTapDamage(event)">👾</div>

            <div class="music-overlay" id="music-overlay">
                <img class="music-image" id="music-image" src="" alt="Music notation">
            </div>
        </div>
    </section>

    <!-- 鋼琴鍵盤 -->
    <section id="piano-deck">
        <button class="piano-key" onclick="handleInput('C')"><span class="sub-text">Do</span>C</button>
        <button class="piano-key" onclick="handleInput('D')"><span class="sub-text">Re</span>D</button>
        <button class="piano-key" onclick="handleInput('E')"><span class="sub-text">Mi</span>E</button>
        <button class="piano-key" onclick="handleInput('F')"><span class="sub-text">Fa</span>F</button>
        <button class="piano-key" onclick="handleInput('G')"><span class="sub-text">Sol</span>G</button>
        <button class="piano-key" onclick="handleInput('A')"><span class="sub-text">La</span>A</button>
        <button class="piano-key" onclick="handleInput('B')"><span class="sub-text">Si</span>B</button>
    </section>

    <!-- 底部導航 -->
    <nav>
        <button class="nav-btn active">
            <div class="nav-icon">🎮</div>
            <span>戰鬥</span>
        </button>
        <button class="nav-btn" onclick="toggleDrawer()">
            <div class="nav-icon">🛠️</div>
            <span>升級</span>
        </button>
        <button class="nav-btn">
            <div class="nav-icon">🏆</div>
            <span>排行</span>
        </button>
    </nav>

    <!-- 升級面板 -->
    <aside id="upgrade-drawer">
        <div class="drawer-header">
            <span class="drawer-title">裝備升級</span>
            <button class="close-btn" onclick="toggleDrawer()">✕</button>
        </div>
        <div class="upgrade-scroll" id="upgrade-list"></div>
    </aside>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        const MONSTERS = ['👾', '👹', '👻', '🤖', '🦖', '👽', '💀', '🧟'];
        const CLEFS = [
            { symbol: 'treble', name: 'Treble' }, 
            { symbol: 'bass', name: 'Bass' }     
        ];
        
        const noteMapping = {
            "IMG_2528.jpeg": "C4", "IMG_2529.jpeg": "D4", "IMG_2530.jpeg": "E4",
            "IMG_2531.jpeg": "F4", "IMG_2532.jpeg": "G4", "IMG_2533.jpeg": "A4",
            "IMG_2534.jpeg": "B4", "IMG_2535.jpeg": "C5", "IMG_2536.jpeg": "D5",
            "IMG_2537.jpeg": "E5", "IMG_2538.jpeg": "F5", "IMG_2539.jpeg": "G5",
            "IMG_2540.jpeg": "A5", "IMG_2541.jpeg": "B5", "IMG_2542.jpeg": "C6"
        };

        const GameState = {
            gold: 0,
            stage: 1,
            monsterHp: 10,
            monsterMaxHp: 10,
            isBoss: false,
            currentNote: 'C4',
            currentClef: CLEFS[0],
            lastAutoTime: 0
        };

        // TT2 風格數據結構
        const PlayerStats = {
            tapDamage: 1,       // 點擊基礎傷害
            skillDamage: 10,    // 答題傷害 (通常為點擊的倍數)
            autoDPS: 0,         // 總自動傷害
            critChance: 0.05,   // 初始暴擊率
            critMult: 5.0,      // 初始暴擊倍率
            goldMult: 1.0       // 金幣倍率
        };

        // 裝備數據庫
        // Type: sword (點擊+技能), hero (DPS), pet (被動)
        const Upgrades = [
            // --- 劍: 點擊與技能並重 ---
            { 
                id: 'sword1', name: '訓練用木劍', desc: '點擊傷害+2, 技能傷害+20', 
                type: 'sword', level: 1, baseCost: 10, costFactor: 1.15, 
                effect: () => { PlayerStats.tapDamage += 2; PlayerStats.skillDamage += 20; } 
            },
            
            // --- 英雄: 純 DPS ---
            { 
                id: 'hero1', name: '見習法師', desc: '自動傷害 +5 DPS', 
                type: 'hero', level: 0, baseCost: 50, costFactor: 1.1, 
                effect: () => { PlayerStats.autoDPS += 5; } 
            },
            { 
                id: 'hero2', name: '森林射手', desc: '自動傷害 +25 DPS', 
                type: 'hero', level: 0, baseCost: 500, costFactor: 1.12, 
                effect: () => { PlayerStats.autoDPS += 25; } 
            },

            // --- 寵物: 被動屬性 ---
            { 
                id: 'pet1', name: '幸運貓', desc: '暴擊率 +2%', 
                type: 'pet', level: 0, baseCost: 200, costFactor: 1.5, 
                effect: () => { PlayerStats.critChance += 0.02; } 
            },
            { 
                id: 'pet2', name: '招財犬', desc: '金幣獲取 +10%', 
                type: 'pet', level: 0, baseCost: 300, costFactor: 1.4, 
                effect: () => { PlayerStats.goldMult += 0.1; } 
            }
        ];

        function init() {
            document.querySelectorAll('img').forEach(img => {
                img.onerror = function() {
                    this.style.display = 'none';
                };
            });

            document.body.addEventListener('click', (e) => {
                if (e.target.closest('button') || e.target.closest('.upgrade-scroll') || e.target.closest('nav')) return;
                handleTapDamage(e);
            });

            spawnMonster();
            renderUpgrades();
            initParticles();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            if (timestamp - GameState.lastAutoTime > 1000) {
                if (GameState.monsterHp > 0) {
                    dealDamage(PlayerStats.autoDPS, false, 'auto');
                }
                GameState.lastAutoTime = timestamp;
            }
            requestAnimationFrame(gameLoop);
        }

        function spawnMonster() {
            // 成長係數: 1.35 (比之前緩和，確保持久戰)
            const growth = 1.35; 
            // 基礎血量: 15
            let hp = 15 * Math.pow(growth, GameState.stage - 1);

            if (GameState.stage % 5 === 0) {
                GameState.isBoss = true;
                hp *= 10; // Boss 10倍血
                document.getElementById('monster-visual').innerText = '👹'; 
            } else {
                GameState.isBoss = false;
                document.getElementById('monster-visual').innerText = MONSTERS[Math.floor(Math.random() * MONSTERS.length)];
            }

            GameState.monsterMaxHp = Math.floor(hp);
            GameState.monsterHp = GameState.monsterMaxHp;
            
            generateQuiz();
            updateUI();
        }

        function generateQuiz() {
            const imgFileNames = Object.keys(noteMapping);
            const randomFileName = imgFileNames[Math.floor(Math.random() * imgFileNames.length)];
            GameState.currentNote = noteMapping[randomFileName];
            document.getElementById('music-image').src = `images/treble/${randomFileName}`;
        }

        function handleTapDamage(e) {
            const x = e.clientX;
            const y = e.clientY;
            createRipple(x, y);

            // 點擊傷害計算
            let dmg = PlayerStats.tapDamage;
            const isCrit = Math.random() < PlayerStats.critChance;
            if (isCrit) dmg *= PlayerStats.critMult;
            
            dealDamage(Math.floor(dmg), isCrit, 'tap', x, y);
            playSound('hit');
        }

        function handleInput(note) {
            const btn = document.querySelector(`.piano-key[onclick="handleInput('${note}')"]`);
            if(btn) {
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 100);
            }

            const noteWithoutOctave = note; 
            const currentNoteWithoutOctave = GameState.currentNote.substring(0, 1);
            
            if (noteWithoutOctave === currentNoteWithoutOctave) {
                // 答題傷害計算 (技能傷害)
                let dmg = PlayerStats.skillDamage;
                const isCrit = Math.random() < PlayerStats.critChance;
                if (isCrit) dmg *= PlayerStats.critMult;
                
                dealDamage(Math.floor(dmg), isCrit, 'skill');
                playSound('hit');
                generateQuiz(); 
            } else {
                showToast("音準偏差！");
            }
        }

        function dealDamage(amount, isCrit, sourceType, x, y) {
            GameState.monsterHp -= amount;
            
            showDamageNumber(amount, isCrit, sourceType, x, y);
            
            if (sourceType !== 'auto') playSound('hit');

            if (GameState.monsterHp <= 0) {
                onMonsterDeath();
            }
            updateUI();
        }

        function onMonsterDeath() {
            // TT2 金幣公式：基礎 * sqrt(怪物血量 * 係數) * 金幣倍率
            // 這裡簡化為: sqrt(HP) * (1 + DPS貢獻係數) * 金幣倍率
            // 讓高傷害能獲得更多金幣
            const dpsFactor = 1 + (PlayerStats.autoDPS / 50); // DPS越高，金幣加成越多
            const goldGain = Math.floor(Math.sqrt(GameState.monsterMaxHp) * dpsFactor * PlayerStats.goldMult);
            
            GameState.gold += goldGain;
            
            playSound('coin');
            showToast(`擊殺! +${formatNumber(goldGain)} G`);
            
            GameState.stage++;
            spawnMonster();
            renderUpgrades();
        }

        function updateUI() {
            document.getElementById('header-stage').innerText = GameState.stage;
            document.getElementById('bg-stage-num').innerText = GameState.stage;
            document.getElementById('header-gold').innerText = formatNumber(GameState.gold);
            document.getElementById('header-dps').innerText = formatNumber(Math.floor(PlayerStats.autoDPS));

            const hpPct = Math.max(0, (GameState.monsterHp / GameState.monsterMaxHp) * 100);
            document.getElementById('hp-bar').style.width = hpPct + '%';
            document.getElementById('hp-current').innerText = formatNumber(GameState.monsterHp);
            document.getElementById('hp-max').innerText = formatNumber(GameState.monsterMaxHp);
        }

        function showDamageNumber(amount, isCrit, sourceType, clickX, clickY) {
            const el = document.createElement('div');
            el.className = `damage-number ${isCrit ? 'crit' : ''}`;
            el.innerText = formatNumber(amount);
            
            let x, y;
            if (sourceType === 'tap' && clickX) {
                x = clickX;
                y = clickY;
            } else {
                const rect = document.querySelector('.monster-wrapper').getBoundingClientRect();
                x = rect.left + rect.width/2 + (Math.random()-0.5)*80;
                y = rect.top + rect.height/3; 
            }
            
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'click-effect';
            ripple.style.left = (x - 25) + 'px';
            ripple.style.top = (y - 25) + 'px';
            ripple.style.width = '50px';
            ripple.style.height = '50px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 300);
        }

        function toggleDrawer() {
            const drawer = document.getElementById('upgrade-drawer');
            drawer.classList.toggle('open');
        }

        function renderUpgrades() {
            const list = document.getElementById('upgrade-list');
            list.innerHTML = '';
            
            Upgrades.forEach((u, idx) => {
                const cost = Math.floor(u.baseCost * Math.pow(u.costFactor, u.level));
                const canBuy = GameState.gold >= cost;
                
                let typeLabel = '';
                let typeClass = '';
                if(u.type === 'sword') { typeLabel = '劍'; typeClass = 'type-sword'; }
                else if(u.type === 'hero') { typeLabel = '英雄'; typeClass = 'type-hero'; }
                else if(u.type === 'pet') { typeLabel = '寵物'; typeClass = 'type-pet'; }

                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.innerHTML = `
                    <div class="item-info">
                        <h3>
                            <span class="item-type ${typeClass}">${typeLabel}</span>
                            ${u.name} 
                            <span style="font-size:12px;color:#666; margin-left:5px;">Lv.${u.level}</span>
                        </h3>
                        <p>${u.desc}</p>
                    </div>
                    <button class="btn-upgrade" onclick="buyUpgrade(${idx})" ${!canBuy ? 'disabled' : ''}>
                        ⚡ ${formatNumber(cost)}
                    </button>
                `;
                list.appendChild(item);
            });
        }

        function buyUpgrade(idx) {
            const u = Upgrades[idx];
            const cost = Math.floor(u.baseCost * Math.pow(u.costFactor, u.level));
            
            if (GameState.gold >= cost) {
                GameState.gold -= cost;
                u.level++;
                u.effect();
                updateUI();
                renderUpgrades();
                playSound('hit');
            }
        }

        function formatNumber(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return Math.floor(num);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
                border-radius: 30px; z-index: 300; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
                animation: popIn 0.3s; pointer-events: none; text-align: center;
                font-size: clamp(14px, 4vw, 20px);
            `;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function initParticles() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * Math.PI * 2,
                    s: Math.random() * 0.8 + 0.2,
                    color: `hsl(${Math.random() * 60 + 200}, 70%, 60%)`
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    p.y -= p.s;
                    p.x += Math.sin(p.d) * 0.5;
                    if(p.y < -10) p.y = canvas.height + 10;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        init();
    </script>
</body>
</html>
